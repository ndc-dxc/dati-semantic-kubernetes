---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: keycloak
  namespace: ndc-dev
  labels:
    app: keycloak
spec:
  host: keycloak-ndc-dev.apps.cloudpub.testedev.istat.it
  to:
    kind: Service
    name: keycloak
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
